# Per-city configuration.
# AOI re-selection in progress (2026-05-30): moving all 4 cities to
# representative BUILT-UP AOIs (old Day-0 park-biased AOIs superseded).
# Hamilton -> Tauranga swap (2026-05-30): Hamilton LiDAR only 2023 vs 2025
# aerial (vintage gap); Tauranga has matched 2025 LiDAR + 2025 aerial.
# City list: Christchurch / Wellington(Hutt) / Tauranga / Auckland.
#   christchurch = CBD + St Albans/Avonside (built-up; Hagley on W edge)
#   wellington   = Lower Hutt CBD + Waterloo (+ E valley steep-slope bush)
#   tauranga     = Tauranga CBD + Otumoetai + Greerton (built-up; NOT Mt Maunganui beach)
#   auckland     = Mt Eden / Epsom inner suburbs by One Tree Hill
# Read this file as UTF-8.

christchurch:
  city_name: "Christchurch"
  region: "canterbury"
  target_crs: "EPSG:2193"
  status: "active"
  notes: |
    AOI (2026-05-30 re-download): central built-up - CBD (Cathedral Sq /
    Colombo St) + St Albans / Avonside inner residential, Hagley Park on the
    W edge. Supersedes the Day-0 BX24 (Hagley Park North) park-biased crop.
    LiDAR survey: canterbury-christchurch 2024-2025 (flown 2024-12 to 2025-01).
    Aerial 2025 is the time-matched pair. 216 tiles, 5.10 km2.
  raw_dir: "christchurch"            # relative to data/raw/
  primary_aerial_year: "2025"        # matched to LiDAR
  available_aerial_years: ["2025"]   # this AOI download is 2025 only
  lidar_survey_id: "canterbury-christchurch_2024-2025"
  lidar_survey_dates:
    flown_from: "2024-12-10"
    flown_to: "2025-01-20"
  aoi_bounds_nztm: [1569897, 5179408, 1572662, 5181251]   # xmin ymin xmax ymax (EPSG:2193)
  aoi_bounds_wgs84: [172.6274, -43.5377, 172.6617, -43.5212]  # lon/lat min,max
  test_tile_ids: []                  # set after M1 on the new AOI
  sample_strategy: "stratified_by_canopy_density"
  hard_negative_categories:
    - "high_density_urban"
    - "suburban"
    - "park"
    - "industrial"
    - "mixed"
  output_dir: "christchurch"

